<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Works - Shop with Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1557597774-9d273605dfa9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }
        #cart-modal { display: none; }
        #cart-modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-500 tracking-wider">IT WORKS</h1>
            <div class="flex items-center space-x-6">
                <button onclick="toggleCart()" class="relative bg-yellow-500 text-slate-900 p-2 rounded-full px-6 font-bold flex items-center shadow-lg transition transform active:scale-95">
                    <i class="fas fa-shopping-cart mr-2"></i>
                    <span id="cart-count" class="mr-2">0</span>
                    <span class="border-l border-slate-800 pl-2">Rs. <span id="cart-total-nav">0</span></span>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero-bg h-[300px] flex items-center justify-center text-center text-white px-4">
        <div>
            <h2 class="text-4xl md:text-5xl font-extrabold mb-2 uppercase">IT Works Billing System</h2>
            <p class="text-lg text-yellow-500 font-medium">Select Items & Generate Instant Bill</p>
        </div>
    </section>

    <section id="products" class="py-12 container mx-auto px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="product-list">
            </div>
    </section>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-60 z- items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
                <h4 class="font-bold text-xl"><i class="fas fa-file-invoice mr-2"></i> Your Bill</h4>
                <button onclick="toggleCart()" class="text-3xl hover:text-red-500 transition">&times;</button>
            </div>
            
            <div id="cart-items" class="p-4 max-h-80 overflow-y-auto space-y-3">
                </div>

            <div class="p-5 border-t bg-gray-50">
                <div class="flex justify-between items-center mb-6 px-2">
                    <span class="text-xl font-bold text-gray-700">Total Amount:</span>
                    <span class="text-2xl font-black text-slate-900">Rs. <span id="cart-total-modal">0</span></span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition flex justify-center items-center shadow-lg">
                    <i class="fab fa-whatsapp mr-2 text-2xl"></i> Send Bill on WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // Product List with Prices (Aap yahan apni marzi ki qemat set kar sakte hain)
        const products = [
            { name: "WiFi Camera", price: 4500 },
            { name: "Analog Camera", price: 2200 },
            { name: "IP Camera", price: 5500 },
            { name: "Camera Door Bell", price: 8500 },
            { name: "DVR (4 Channel)", price: 9500 },
            { name: "NVR (4 Channel)", price: 12000 },
            { name: "2MP Camera", price: 2800 },
            { name: "5MP Camera", price: 4200 },
            { name: "3MP Camera", price: 3200 },
            { name: "4MP Camera", price: 3800 },
            { name: "Hard Disk 500GB", price: 2500 },
            { name: "POE Switch", price: 4500 },
            { name: "Tenda WiFi Router", price: 3500 },
            { name: "Wire Roll (Full)", price: 15000 },
            { name: "BNC Connector", price: 50 },
            { name: "DC Connector", price: 30 },
            { name: "Biometric Machine", price: 18000 },
            { name: "LCD 19 inch", price: 6500 },
            { name: "Power Supply 5A", price: 1200 },
            { name: "Wireless Mouse", price: 850 }
        ];

        let cart = JSON.parse(localStorage.getItem('itworks_cart')) || [];

        function displayProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div class="bg-white border-2 border-gray-100 rounded-2xl p-5 shadow-sm hover:border-yellow-500 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-gray-100 p-3 rounded-xl group-hover:bg-yellow-100 transition">
                            <i class="fas fa-box text-2xl text-slate-400 group-hover:text-yellow-600"></i>
                        </div>
                        <span class="bg-green-100 text-green-700 font-bold px-3 py-1 rounded-full text-sm">Rs. ${p.price}</span>
                    </div>
                    <h5 class="font-bold text-lg text-slate-800 mb-4 h-12">${p.name}</h5>
                    <button onclick="addToCart('${p.name}', ${p.price})" class="w-full py-3 bg-slate-900 text-white rounded-xl hover:bg-yellow-500 hover:text-slate-900 transition font-bold shadow-md">
                        Add to Bill
                    </button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('itworks_cart', JSON.stringify(cart));
            
            // Calculate Total
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Update UI
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total-nav').innerText = total.toLocaleString();
            document.getElementById('cart-total-modal').innerText = total.toLocaleString();
            
            const cartItemsDiv = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartItemsDiv.innerHTML = `
                    <div class="text-center py-10 text-gray-400">
                        <i class="fas fa-shopping-basket text-4xl mb-2"></i>
                        <p>No items added yet</p>
                    </div>`;
            } else {
                cartItemsDiv.innerHTML = cart.map((item, index) => `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div>
                            <p class="font-bold text-slate-800">${item.name}</p>
                            <p class="text-xs text-gray-500">Price: Rs. ${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `).join('');
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('active');
        }

        function sendOrder() {
            if(cart.length === 0) return alert("Pehle saman select karein!");
            
            const phoneNumber = "923000000000"; // APNA WHATSAPP NUMBER LIKHAIN
            let total = 0;
            let message = "📄 *IT WORKS - NEW ORDER*\n";
            message += "--------------------------\n";
            
            cart.forEach((item, i) => {
                message += `${i+1}. *${item.name}* - Rs. ${item.price}\n`;
                total += item.price;
            });
            
            message += "--------------------------\n";
            message += `*TOTAL BILL: Rs. ${total}*\n`;
            message += "--------------------------\n";
            message += "Kindly confirm my order.";
            
            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/${phoneNumber}?text=${encodedMsg}`, '_blank');
        }

        displayProducts();
        updateCart();
    </script>
</body>
</html>
